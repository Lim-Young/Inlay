name: release

# 推送形如 v0.1.0 的 tag 时自动发布到 npm；也可手动触发。
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # 供 npm provenance（供应链溯源）使用
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # 无运行时依赖，测试只用 node 内置模块
      - name: Test
        run: node --test test/*.test.js

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
